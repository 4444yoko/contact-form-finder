<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>株式会社サンプル | Webサイト制作・コンサルティング</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7;margin:0;color:#1f2937}
    header{background:#1f2937;color:#fff;padding:18px 36px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-weight:700;font-size:18px}
    nav a{color:#fff;margin-left:28px;text-decoration:none;font-size:14px}
    nav a:hover{color:#fde68a}
    .hero{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:80px 36px;text-align:center}
    .hero h1{font-size:32px;margin:0 0 16px}
    .hero p{font-size:16px;margin:0;opacity:.9}
    main{padding:60px 36px;max-width:960px;margin:0 auto}
    h2{font-size:24px;margin:0 0 16px;color:#111827}
    .features{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:32px}
    .feature{padding:20px;background:#f9fafb;border-radius:8px}
    .feature h3{margin:0 0 8px;font-size:16px;color:#2563eb}
    footer{background:#f3f4f6;padding:36px;margin-top:64px;border-top:1px solid #e5e7eb}
    .foot-links{text-align:center;margin-bottom:16px}
    .foot-links a{color:#2563eb;margin:0 16px;text-decoration:none;font-size:14px}
    .foot-links a:hover{text-decoration:underline}
    .copy{text-align:center;color:#6b7280;font-size:12px}
  </style>
</head>
<body>
  <header>
    <div class="brand">株式会社サンプル</div>
    <nav>
      <a href="https://example.co.jp/services">サービス</a>
      <a href="https://example.co.jp/about">会社案内</a>
      <a href="https://example.co.jp/news">お知らせ</a>
      <a href="https://example.co.jp/contact">お問い合わせ</a>
    </nav>
  </header>

  <section class="hero">
    <h1>地域密着のWeb制作・コンサルティング</h1>
    <p>中小企業様のビジネスを総合的にサポートします</p>
  </section>

  <main>
    <h2>提供サービス</h2>
    <div class="features">
      <div class="feature"><h3>Webサイト制作</h3><p>レスポンシブ対応の高品質なサイトを企画から運用まで一貫してご提供。</p></div>
      <div class="feature"><h3>SEOコンサル</h3><p>検索順位向上のための分析と改善提案を継続的に実施します。</p></div>
      <div class="feature"><h3>運用保守</h3><p>セキュリティアップデートと定期的な改善で安定運用を支援。</p></div>
    </div>
  </main>

  <footer>
    <div class="foot-links">
      <a href="https://example.co.jp/contact">お問い合わせフォーム</a>
      <a href="https://example.co.jp/inquiry">ご相談・ご質問</a>
      <a href="https://example.co.jp/recruit">採用情報</a>
      <a href="https://example.co.jp/privacy">プライバシーポリシー</a>
    </div>
    <div class="copy">© 2026 株式会社サンプル</div>
  </footer>
</body>
</html>
