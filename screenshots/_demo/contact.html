<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>お問い合わせ | 株式会社サンプル</title>
  <meta property="og:site_name" content="株式会社サンプル">
  <style>
    *{box-sizing:border-box}
    body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7;margin:0;color:#1f2937;background:#f9fafb}
    header{background:#1f2937;color:#fff;padding:14px 36px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-weight:700}
    header a{color:#fff;font-size:13px;text-decoration:none}
    main{max-width:680px;margin:32px auto;padding:32px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    h1{font-size:22px;margin:0 0 8px;color:#111827}
    .lead{color:#6b7280;font-size:13px;margin:0 0 24px}
    form table{width:100%;border-collapse:collapse}
    form th{text-align:left;width:140px;padding:12px 8px;font-weight:600;font-size:13px;color:#374151;vertical-align:top;border-bottom:1px solid #f3f4f6}
    form td{padding:12px 8px;border-bottom:1px solid #f3f4f6}
    form input[type=text],form input[type=email],form input[type=tel],form select,form textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:4px;font-family:inherit;font-size:13px}
    form input.short{width:80px;display:inline-block}
    form input.medium{width:160px;display:inline-block}
    .req{color:#b91c1c;margin-left:4px;font-weight:400}
    .submit{margin-top:24px;text-align:center}
    button{background:#2563eb;color:#fff;border:0;padding:10px 32px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
  </style>
</head>
<body>
  <header>
    <div class="brand">株式会社サンプル</div>
    <a href="home.html">← トップへ戻る</a>
  </header>
  <main>
    <h1>お問い合わせフォーム</h1>
    <p class="lead">下記フォームよりお気軽にお問い合わせください。担当者より3営業日以内にご返信いたします。</p>
    <form>
      <table>
        <tr><th>お名前<span class="req">*</span></th><td>
          <input type="text" name="lastName" class="medium" placeholder="姓">
          <input type="text" name="firstName" class="medium" placeholder="名">
        </td></tr>
        <tr><th>フリガナ</th><td>
          <input type="text" name="lastNameKana" class="medium" placeholder="セイ">
          <input type="text" name="firstNameKana" class="medium" placeholder="メイ">
        </td></tr>
        <tr><th>メールアドレス<span class="req">*</span></th><td>
          <input type="email" name="email" placeholder="example@email.com">
        </td></tr>
        <tr><th>電話番号</th><td>
          <input type="tel" name="phone" class="medium" placeholder="03-1234-5678">
        </td></tr>
        <tr><th>郵便番号</th><td>
          〒 <input type="text" name="zip1" class="short" maxlength="3"> -
          <input type="text" name="zip2" class="short" maxlength="4">
        </td></tr>
        <tr><th>都道府県</th><td>
          <select name="prefecture" class="medium">
            <option>選択してください</option>
            <option>北海道</option><option>青森県</option><option>岩手県</option>
            <option>東京都</option><option>神奈川県</option><option>千葉県</option><option>埼玉県</option>
            <option>大阪府</option><option>京都府</option><option>兵庫県</option>
            <option>愛知県</option><option>福岡県</option>
          </select>
        </td></tr>
        <tr><th>市区町村</th><td><input type="text" name="city" placeholder="例: 渋谷区"></td></tr>
        <tr><th>番地</th><td><input type="text" name="street" placeholder="例: 渋谷1-2-3"></td></tr>
        <tr><th>建物名</th><td><input type="text" name="building" placeholder="例: ○○ビル 5F"></td></tr>
        <tr><th>会社名</th><td><input type="text" name="company"></td></tr>
        <tr><th>部署名</th><td><input type="text" name="department"></td></tr>
        <tr><th>お問い合わせ内容<span class="req">*</span></th><td>
          <textarea name="message" rows="8"></textarea>
        </td></tr>
      </table>
      <div class="submit">
        <button type="submit">送信する</button>
      </div>
    </form>
  </main>
</body>
</html>
